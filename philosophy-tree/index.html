<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Древо философии — интерактивная схема</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page" id="page">
    <section class="tree-stage" id="treeStage" aria-label="Интерактивное древо философии">
      <img class="tree-image" src="assets/treezoomed.png" alt="Древо философии: семя, корни, росток, ствол, ветви, листья, кислород, плоды и семена" />

      <svg class="hotspot-layer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="false">
        <defs>
          <filter id="hotspotGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.2" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <!-- Большие зоны идут первыми, маленькие — последними, чтобы проще наводиться -->

        <!-- 1. Земля -->
        <rect class="hotspot" tabindex="0" role="button"
          data-id="soil"
          data-title="Земля"
          data-description="Человеческая природа: чувства, стремления, страхи, желания, любопытство и жажда смысла. Почва, из которой рождается познание."
          data-details="Страх смерти и конечности — «что будет после?»|Любопытство — «почему мир устроен именно так?»|Страдание и поиск утешения|Жажда смысла и внутреннего порядка|Удивление перед самим фактом существования"
          x="0" y="69" width="100" height="31" />

        <!-- 3. Корни -->
        <path class="hotspot" tabindex="0" role="button"
          data-id="roots"
          data-title="Корни"
          data-description="Углубляющиеся вопросы, которые питаются человеческим опытом и уходят всё глубже к основаниям бытия, знания и смысла."
          data-details="Что такое сознание?|Существует ли свобода воли?|Что такое истина и как её отличить?|Что есть добро?|Что лежит в основе реальности?"
          d="M 24 72 C 18 78, 18 92, 28 98 L 72 98 C 82 92, 82 78, 76 72 C 69 69, 61 69, 56 71 C 53 72, 52 73, 50 73 C 48 73, 47 72, 44 71 C 39 69, 31 69, 24 72 Z" />

        <!-- 5. Ствол -->
        <path class="hotspot" tabindex="0" role="button"
          data-id="trunk"
          data-title="Ствол"
          data-description="Философия как основа мировоззрения: центральная структура, которая соединяет глубинные вопросы с развитым знанием."
          data-details="Метафизика — что есть бытие|Эпистемология — как мы познаём|Этика — как жить и что есть благо|Логика — законы правильного мышления|Связывает первичные вопросы со зрелым знанием"
          d="M 36 39 C 39 34, 44 31, 50 30 C 56 31, 61 34, 64 39 L 67 48 C 69 55, 73 60, 80 66 L 80 69 L 20 69 L 20 66 C 27 60, 31 55, 33 48 Z" />

        <!-- 7. Листья -->
        <path class="hotspot" tabindex="0" role="button"
          data-id="leaves"
          data-title="Листья"
          data-description="Отдельные идеи, понятия, теории, аргументы и модели, появляющиеся на ветвях знания."
          data-details="Теория эволюции|Теорема Пифагора|Категорический императив Канта|Планетарная модель атома|Конкретные гипотезы и аргументы"
          d="M 18 24 C 24 15, 37 10, 50 10 C 63 10, 76 15, 82 24 C 86 31, 85 39, 80 44 C 73 48, 63 49, 50 49 C 37 49, 27 48, 20 44 C 15 39, 14 31, 18 24 Z" />

        <!-- 6. Ветви -->
        <path class="hotspot" tabindex="0" role="button"
          data-id="branches"
          data-title="Ветви"
          data-description="Науки, направления, школы и разные пути знания, которые вырастают из философского ствола."
          data-details="Естественные науки: физика, химия, биология|Гуманитарные: история, лингвистика, психология|Философские школы: стоицизм, эмпиризм, рационализм|Методологии и научный метод"
          d="M 28 39 C 34 33, 43 29, 52 29 C 61 29, 69 33, 74 39 C 75 43, 73 47, 70 50 C 66 52, 61 52, 56 51 C 53 50, 50 50, 47 50 C 42 51, 37 52, 33 51 C 29 49, 27 45, 28 39 Z" />

        <!-- 8. Кислород -->
        <path class="hotspot" tabindex="0" role="button"
          data-id="oxygen"
          data-title="Кислород"
          data-description="Смысл, который позволяет человеку «дышать»: понимать себя, мир, страдание, смерть, истину и будущее."
          data-details="Понимание себя и своих переживаний|Принятие смертности и конечности|Чувство цели и направления|Опора перед лицом страдания|Ориентир в сложном и непонятном мире"
          d="M 0 3 C 8 2, 15 4, 22 6 C 28 8, 33 12, 38 18 C 40 20, 40 23, 36 24 C 29 25, 20 22, 12 19 C 6 17, 2 12, 0 8 Z" />

        <!-- 10. Семена -->
        <path class="hotspot" tabindex="0" role="button"
          data-id="new-seeds"
          data-title="Семена"
          data-description="Новые вопросы, рождающиеся из зрелого знания. Из них могут вырасти новые деревья познания."
          data-details="Физика → космология: как возникла Вселенная?|Биология → нейронаука: как мозг рождает разум?|Информатика → этика ИИ: может ли машина мыслить?|Каждый ответ рождает новые вопросы"
          d="M 64 62 C 67 51, 81 44, 95 43 C 91 53, 79 61, 64 62 Z" />

        <!-- 9. Плоды -->
        <ellipse class="hotspot" tabindex="0" role="button"
          data-id="fruits"
          data-title="Плоды"
          data-description="Улучшения жизни: технологии, культура, инструменты, комфорт, медицина, образование и практическая польза знания."
          data-details="Медицина: вакцины, антибиотики, хирургия|Технологии: электричество, интернет, транспорт|Образование и распространение знания|Культура и искусство|Инструменты и бытовой комфорт"
          cx="64.5" cy="34" rx="10" ry="7" />

        <!-- 4. Росток -->
        <path class="hotspot" tabindex="0" role="button"
          data-id="sprout"
          data-title="Росток"
          data-description="Первые мысли, интуиции, мифы, образы и гипотезы, через которые знание начинает проявляться."
          data-details="Мифы о сотворении мира|Интуитивные догадки о природе вещей|Ранние объяснения («молния — гнев богов»)|Первые натурфилософские теории (вода, огонь как первооснова)"
          d="M 45.5 60.5 L 54.5 60.5 L 54.5 69.5 L 45.5 69.5 Z" />

        <!-- 2. Семя -->
        <ellipse class="hotspot" tabindex="0" role="button"
          data-id="seed"
          data-title="Семя"
          data-description="Первичный вопрос: что существует? почему есть мир? кто я? как жить?"
          data-details="Что существует на самом деле?|Почему есть нечто, а не ничто?|Кто я и в чём моя суть?|Как следует жить?|Есть ли скрытый порядок за реальностью?"
          cx="50" cy="71.6" rx="2.4" ry="3.2" />
      </svg>

      <div class="tooltip" id="tooltip" aria-hidden="true">
        <h3 id="tipTitle"></h3>
        <p id="tipText"></p>
      </div>
    </section>

    <aside class="side-panel" id="sidePanel" aria-live="polite" aria-hidden="true">
      <div class="side-panel__inner">
        <h2 id="cardTitle"></h2>
        <p id="cardText"></p>
        <ul class="side-panel__list" id="cardList"></ul>
      </div>
    </aside>

    <div class="coord-debug" id="coordDebug" hidden>coords</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
